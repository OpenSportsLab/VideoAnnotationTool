site_name: Video Annotation Tool
site_description: A PyQt6 GUI tool for analyzing and annotating OSL datasets (OpenSportsLab)
site_author: OpenSportsLab
repo_url: https://github.com/OpenSportsLab/VideoAnnotationTool
repo_name: OpenSportsLab/VideoAnnotationTool

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting Started: getting_started.md
  - User Guide:
      - GUI Overview: gui_overview.md
      - Annotating: annotating.md
      - Editing: editing.md
      - Saving and Loading: saving_loading.md
      - Keyboard Shortcuts: shortcuts.md
  - Data Transfer and Batch Tools: batch_tools.md
  - OSL JSON Format: OSL.md
  - FAQ: faq.md
  - Troubleshooting: troubleshooting.md
  - About: about.md
  - Contributing: contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - footnotes
  - tables
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.extra
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true

plugins:
  - search
